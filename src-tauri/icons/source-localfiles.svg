<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="folderfront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fde8c4"/>
    </linearGradient>
  </defs>

  <!-- fundo -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="512" rx="200" fill="url(#sheen)"/>

  <!-- pasta: corpo de trás (com a aba) -->
  <path d="M 212 330
           Q 212 296 246 296
           L 420 296
           Q 444 296 458 316
           L 492 362
           L 778 362
           Q 812 362 812 396
           L 812 640
           L 212 640 Z"
        fill="#fff3dd" opacity="0.92"/>

  <!-- papéis saindo da pasta -->
  <rect x="300" y="330" width="380" height="300" rx="18" fill="#ffffff" opacity="0.85"
        transform="rotate(-4 490 480)"/>
  <g opacity="0.5" transform="rotate(-4 490 480)">
    <rect x="336" y="380" width="240" height="18" rx="9" fill="#b45309"/>
    <rect x="336" y="422" width="300" height="18" rx="9" fill="#d97706"/>
    <rect x="336" y="464" width="200" height="18" rx="9" fill="#d97706"/>
  </g>

  <!-- pasta: frente (inclinada, estilo aberta) -->
  <path d="M 180 470
           Q 184 440 214 440
           L 830 440
           Q 862 440 856 472
           L 812 700
           Q 806 730 774 730
           L 236 730
           Q 206 730 202 700 Z"
        fill="url(#folderfront)"/>

  <!-- easter egg da marca -->
  <text x="512" y="880" font-family="Segoe Script, cursive" font-size="88"
        fill="#ffffff" opacity="0.55" text-anchor="middle">Taylor</text>
</svg>
